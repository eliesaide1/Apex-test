# Render.com blueprint — one HTTPS web service that builds the frontend and
# serves it from the FastAPI backend. Deploy: push to GitHub, then in Render
# "New +" -> "Blueprint" and point it at this repo.
#
# HTTPS is provided automatically, which the webcam + fullscreen features require.
#
# FREE PLAN: no persistent disk, and the service sleeps after ~15 min idle. The
# SQLite DB lives in the container's ephemeral filesystem — it persists while the
# service is running (fine for a single exam sitting) but resets on restart/sleep.
# For durable data across restarts, switch to `plan: starter` and add a `disk:`
# block mounted at /var/data (see git history / README).
services:
  - type: web
    name: apextestportal
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true          # random, used to sign auth tokens
      - key: PROCTOR_PASSWORD
        sync: false                  # set in the Render dashboard (secret)
      - key: EXAM_CODE
        value: APEX-TEST             # code candidates enter to start
